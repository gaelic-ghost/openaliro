# No-op twin of sanitizers for PRs that touch none of its paths. `asan-ubsan`
# is a required status check, and a path-skipped workflow never reports —
# leaving the PR stuck at "Expected". Same workflow + job name, inverse trigger
# (paths-ignore vs paths on the identical list), so exactly one of the pair
# reports per PR. Per GitHub docs: "Handling skipped but required checks".
name: sanitizers

on:
  pull_request:
    paths-ignore:
      - modules/woz_uwb/**
      - tests/host/**
      - Makefile
      - .github/workflows/sanitizers.yml

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - run: echo "no core/test changes — sanitizer suite not needed"
