# Woz Aliro-UWB Kconfig overlay — pass via -DEXTRA_CONF_FILE=<...>/woz-aliro.conf
#
# Additive/override layer on the stock matter-aliro-door-lock-app prj.conf. Keeps
# the upstream tree pristine (nothing edited in-tree). Each setting is independent.

# --- Logging ---------------------------------------------------------------
# RFAL at INFO (upstream ships DBG): surfaces ST25R300 reader init + tag/ISO-DEP
# detection + the "ECP Aliro frame armed" line, without DBG noise. Trim to WRN
# once the tap path is stable.
CONFIG_DOOR_LOCK_RFAL_LOG_LEVEL_INF=y
# Thread is the transport, not what we debug — drop OpenThread to critical-only
# (removes its INFO/WRN format strings from rodata; Matter/app/UWB stay at INFO).
CONFIG_OPENTHREAD_LOG_LEVEL_CRIT=y

# --- Apple ECP / Express tap ----------------------------------------------
# Register the RFAL proprietary-poll hook so the reader broadcasts an Aliro-TCI
# ECP frame each poll → iPhone auto-presents its Aliro pass with no Face ID. The
# hook implementation is the out-of-tree woz_aliro_ecp module (not in-tree).
CONFIG_DOOR_LOCK_NFC_PROP=y

# --- No-bootloader flash fit (pairs with sysbuild-woz.conf + pm_static.yml) --
# MCUboot dropped for the bench demo to reclaim its app-core slot for the UWB
# engine. Matter's own bootloader choice defaults to MCUboot and select's
# IMG_MANAGER (deps now unmet) → point it at NONE to match.
CONFIG_CHIP_BOOTLOADER_NONE=y

# --- Lock simulator responsiveness ----------------------------------------
# Snap the simulated bolt movement from the add-on default (2000 ms) to 100 ms.
# Only the final EnteringUnsecured -> Unsecured transition fires the state-change
# callback driving the Matter LockState report, so the 2 s default adds ~2 s lag
# to every confirmation on the phone. Cosmetic actuation time only.
CONFIG_DOOR_LOCK_ALIRO_LOCK_SIM_MOVEMENT_TIME_MS=100

# --- Thread ICD / Sleepy-End-Device responsiveness -------------------------
# As a Thread Sleepy End Device with Matter ICD, the lock only exchanges with the
# network every CONFIG_CHIP_ICD_SLOW_POLL_INTERVAL (2500 ms default), gating
# outbound Matter reports. Poll faster (200 ms) so the LockState report leaves
# promptly. Trade: more idle radio power, irrelevant on the USB-powered DK.
CONFIG_CHIP_ICD_SLOW_POLL_INTERVAL=200

# --- DW3000 / UWB bring-up -------------------------------------------------
# Don't runtime-suspend the idle SPIM4 before the (late) UWB ranging probe; the
# add-on default suspends idle SPI.
CONFIG_PM_DEVICE_RUNTIME=n
# Kernel heap for the UWB stack (qmalloc() -> k_malloc()). The add-on defaults it
# to 0; give the UWB stack headroom (96 KB), shared with BLE/Thread/Matter.
CONFIG_HEAP_MEM_POOL_SIZE=98304
# UWB MAC worker stacks come from k_thread_stack_alloc(), which needs these
# enabled (the add-on defaults them off).
CONFIG_DYNAMIC_THREAD=y
CONFIG_DYNAMIC_THREAD_ALLOC=y

# --- Aliro BLE Time Sync ---------------------------------------------------
# Advertise Timesync Procedure 0 so the iPhone sends a Time Sync message
# (unsolicited, after Access-Protocol-Completed, before M1) carrying its
# UWB_Device_Time. Both procedures default n upstream, so a stock build never
# advertises support and the phone never sends one. Procedure 0 alone suffices to
# catch the first Pre-POLL.
CONFIG_DOOR_LOCK_ALIRO_BLE_SERVICE_TIMESYNC_PROCEDURE_0=y

# --- Log buffer + Matter level ---------------------------------------------
# Bigger deferred LOG buffer so the AUTH/Matter burst doesn't overflow. Matter
# kept at INFO so the commissioning QR URL prints at boot (WRN would suppress it).
CONFIG_LOG_BUFFER_SIZE=16384
CONFIG_MATTER_LOG_LEVEL_INF=y

# --- 802.15.4 serialization host — MUST mirror net core --------------------
# The app core runs the nRF 802.15.4 serialization host (CONFIG_NRF_802154_SER_HOST);
# its RX queue and pending-address tables must equal the net-core radio side exactly
# (see ipc_radio.conf) or the two cores desync. These mirror the net-core trim for a
# Thread MTD-SED and also recover the same buffers on the app core.
CONFIG_NRF_802154_RX_BUFFERS=8
CONFIG_NRF_802154_PENDING_SHORT_ADDRESSES=1
CONFIG_NRF_802154_PENDING_EXTENDED_ADDRESSES=1

# --- BLE advertising: no wall-clock expiry tag ------------------------------
# The Aliro advertisement's Dynamic Tag embeds "lock unix time + 900 s" as an
# expiry; iPhones silently ignore an advertisement whose expiry lies in their
# past. Apple provisions time once and never re-syncs, and our persisted-clock
# restore (DOOR_LOCK_TIME_CONCEPT_PERSIST) understates real time by the
# accumulated power-off duration, so a valid-but-lagging clock pre-expires
# every advertisement and kills unlock-on-approach. Phones accept the
# "expiry unavailable" form, so keep the tag off until a real time source
# (e.g. SNTP) exists.
CONFIG_DOOR_LOCK_ALIRO_BLE_SERVICE_DYNAMIC_TAG=n

# Console cosmetics (prompt, VT100 + log colors) are gated behind PRETTY=1 in
# woz-pretty.conf; the default console is plain.
