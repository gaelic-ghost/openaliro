# Temporary diagnostics for the learned-credential loss across reboot (the
# Aliro Access Document store on the MX25R64 external NVS): every log line
# that could explain the loss is compiled out by default (LOG_DEFAULT_LEVEL=0),
# so a boot-time wipe would be invisible. Layered by NVS=1 ./build.sh build.
# Drop before any PR.

# external_nvs: init, unique-ID rollback check ("Clearing the storage"),
# counter reads, AEAD decrypt failures, storage errors.
CONFIG_DOOR_LOCK_EXTERNAL_NVS_LOG_LEVEL_DBG=y

# Zephyr NVS driver backing the QSPI partition: mount, sector recovery, gc.
CONFIG_NVS_LOG_LEVEL_DBG=y

# matter_access: boot-time user/credential replay.
CONFIG_DOOR_LOCK_MATTER_ACCESS_LOG_LEVEL_DBG=y

# App Aliro modules: "Storing Access Document at index", "Loaded AD at index",
# kpersistent map scan.
CONFIG_DOOR_LOCK_APP_LOG_LEVEL_DBG=y

# On-target inspection: ext_nvs list/read/unique_id (compare the device vs
# stored rollback-protection IDs across a reboot).
CONFIG_DOOR_LOCK_EXTERNAL_NVS_SHELL=y
